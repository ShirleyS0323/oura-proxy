<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>元气晨报 · Oura睡眠分析</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1410;
    --paper: #f5f0e8;
    --amber: #c8832a;
    --amber-light: #e8a84a;
    --vermillion: #c0392b;
    --sage: #7a9a7a;
    --mist: #e8e2d8;
    --gold: #d4a843;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--ink);
    color: var(--paper);
    font-family: 'Noto Serif SC', serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(ellipse at 20% 50%, rgba(200,131,42,0.08) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(122,154,122,0.06) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 720px;
    margin: 0 auto;
    padding: 48px 24px;
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 48px;
  }

  .header-symbol {
    font-size: 11px;
    letter-spacing: 0.4em;
    color: var(--amber);
    text-transform: uppercase;
    margin-bottom: 16px;
    opacity: 0.8;
  }

  .header h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.8rem;
    font-weight: 300;
    letter-spacing: 0.05em;
    color: var(--paper);
    line-height: 1.1;
  }

  .header h1 span {
    color: var(--amber);
    font-style: italic;
  }

  .header-sub {
    font-size: 13px;
    color: rgba(245,240,232,0.4);
    margin-top: 10px;
    letter-spacing: 0.15em;
  }

  .divider {
    width: 60px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--amber), transparent);
    margin: 20px auto;
  }

  /* Date selector */
  .date-bar {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 32px;
    background: rgba(245,240,232,0.04);
    border: 1px solid rgba(200,131,42,0.2);
    border-radius: 4px;
    padding: 14px 20px;
  }

  .date-bar label {
    font-size: 12px;
    letter-spacing: 0.2em;
    color: var(--amber);
    white-space: nowrap;
  }

  .date-bar input[type="date"] {
    background: transparent;
    border: none;
    color: var(--paper);
    font-family: 'Noto Serif SC', serif;
    font-size: 14px;
    outline: none;
    cursor: pointer;
    flex: 1;
  }

  .date-bar input[type="date"]::-webkit-calendar-picker-indicator {
    filter: invert(0.7) sepia(1) saturate(2) hue-rotate(5deg);
    cursor: pointer;
  }

  .fetch-btn {
    background: var(--amber);
    color: var(--ink);
    border: none;
    padding: 10px 24px;
    font-family: 'Noto Serif SC', serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.1em;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .fetch-btn:hover { background: var(--amber-light); }
  .fetch-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Stats grid */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 24px;
  }

  .stat-card {
    background: rgba(245,240,232,0.04);
    border: 1px solid rgba(245,240,232,0.08);
    padding: 20px 16px;
    text-align: center;
    border-radius: 4px;
    transition: border-color 0.3s;
  }

  .stat-card.highlight { border-color: rgba(200,131,42,0.35); }

  .stat-label {
    font-size: 10px;
    letter-spacing: 0.25em;
    color: rgba(245,240,232,0.4);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .stat-value {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.2rem;
    font-weight: 300;
    color: var(--amber-light);
    line-height: 1;
  }

  .stat-unit {
    font-size: 11px;
    color: rgba(245,240,232,0.35);
    margin-top: 4px;
  }

  .score-bar {
    width: 100%;
    height: 2px;
    background: rgba(245,240,232,0.08);
    border-radius: 1px;
    margin-top: 10px;
    overflow: hidden;
  }

  .score-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--amber), var(--amber-light));
    border-radius: 1px;
    transition: width 1s ease;
  }

  /* Sleep stages */
  .stages-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-bottom: 24px;
  }

  .stage-pill {
    background: rgba(245,240,232,0.03);
    border: 1px solid rgba(245,240,232,0.07);
    padding: 14px 10px;
    text-align: center;
    border-radius: 4px;
  }

  .stage-name {
    font-size: 9px;
    letter-spacing: 0.2em;
    color: rgba(245,240,232,0.35);
    margin-bottom: 6px;
  }

  .stage-val {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.4rem;
    color: var(--sage);
  }

  /* Analysis section */
  .analysis-section {
    border: 1px solid rgba(200,131,42,0.2);
    border-radius: 4px;
    overflow: hidden;
  }

  .analysis-header {
    background: rgba(200,131,42,0.1);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-bottom: 1px solid rgba(200,131,42,0.15);
  }

  .analysis-header-icon {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--amber);
    flex-shrink: 0;
  }

  .analysis-header h3 {
    font-size: 11px;
    letter-spacing: 0.3em;
    color: var(--amber);
    font-weight: 400;
  }

  .analysis-body {
    padding: 28px 24px;
    min-height: 120px;
  }

  .analysis-text {
    font-size: 15px;
    line-height: 2;
    color: rgba(245,240,232,0.85);
    font-weight: 300;
  }

  .analysis-text h4 {
    color: var(--amber-light);
    font-size: 13px;
    letter-spacing: 0.2em;
    margin: 20px 0 10px;
    font-weight: 400;
  }

  .analysis-text ul {
    padding-left: 1.2em;
  }

  .analysis-text li {
    margin-bottom: 6px;
    color: rgba(245,240,232,0.75);
  }

  /* Loading state */
  .loading-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    padding: 40px;
    color: rgba(245,240,232,0.4);
    font-size: 13px;
    letter-spacing: 0.15em;
  }

  .loading-ring {
    width: 32px;
    height: 32px;
    border: 1px solid rgba(200,131,42,0.2);
    border-top-color: var(--amber);
    border-radius: 50%;
    animation: spin 1.2s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 40px;
    color: rgba(245,240,232,0.25);
    font-size: 13px;
    letter-spacing: 0.15em;
    line-height: 2;
  }

  /* Error */
  .error-msg {
    background: rgba(192,57,43,0.1);
    border: 1px solid rgba(192,57,43,0.3);
    border-radius: 4px;
    padding: 14px 20px;
    font-size: 13px;
    color: #e88;
    margin-bottom: 20px;
    display: none;
  }

  /* Fade in animation */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .fade-in { animation: fadeUp 0.5s ease forwards; }

  .hidden { display: none; }

  .watermark {
    text-align: center;
    margin-top: 48px;
    font-size: 10px;
    letter-spacing: 0.3em;
    color: rgba(245,240,232,0.12);
  }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="header-symbol">☽ &nbsp; 元气晨报 &nbsp; ☽</div>
    <h1>Sleep <span>Analysis</span></h1>
    <div class="divider"></div>
    <div class="header-sub">Oura Ring · 中医体质 · 每日复盘</div>
  </div>

  <div class="date-bar">
    <label>分析日期</label>
    <input type="date" id="dateInput">
    <button class="fetch-btn" id="fetchBtn" onclick="fetchAndAnalyze()">获取分析</button>
  </div>

  <div class="error-msg" id="errorMsg"></div>

  <div id="statsSection" class="hidden">
    <div class="stats-grid fade-in">
      <div class="stat-card highlight">
        <div class="stat-label">睡眠评分</div>
        <div class="stat-value" id="sleepScore">—</div>
        <div class="score-bar"><div class="score-fill" id="scoreBar" style="width:0%"></div></div>
      </div>
      <div class="stat-card">
        <div class="stat-label">总睡眠时长</div>
        <div class="stat-value" id="totalSleep">—</div>
        <div class="stat-unit">小时</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">HRV 均值</div>
        <div class="stat-value" id="hrv">—</div>
        <div class="stat-unit">ms</div>
      </div>
    </div>

    <div class="stages-row fade-in">
      <div class="stage-pill">
        <div class="stage-name">AWAKE</div>
        <div class="stage-val" id="stageAwake">—</div>
      </div>
      <div class="stage-pill">
        <div class="stage-name">LIGHT</div>
        <div class="stage-val" id="stageLight">—</div>
      </div>
      <div class="stage-pill">
        <div class="stage-name">DEEP</div>
        <div class="stage-val" id="stageDeep">—</div>
      </div>
      <div class="stage-pill">
        <div class="stage-name">REM</div>
        <div class="stage-val" id="stageRem">—</div>
      </div>
    </div>
  </div>

  <div class="analysis-section">
    <div class="analysis-header">
      <div class="analysis-header-icon"></div>
      <h3>AI · 中医体质分析</h3>
    </div>
    <div class="analysis-body" id="analysisBody">
      <div class="empty-state">
        选择日期后点击「获取分析」<br>开始今日元气解读 🌿
      </div>
    </div>
  </div>

  <div class="watermark">OURA × TCM WELLNESS · PERSONAL USE ONLY</div>
</div>

<script>
const OURA_TOKEN = 'VW6H2LP3PMU4F7O67V63AGUDG5KJSGOY';

// Set default date to yesterday
const yesterday = new Date();
yesterday.setDate(yesterday.getDate() - 1);
document.getElementById('dateInput').value = yesterday.toISOString().split('T')[0];

function fmtMins(mins) {
  if (!mins) return '—';
  const h = Math.floor(mins / 60);
  const m = mins % 60;
  return h > 0 ? `${h}h${m > 0 ? m + 'm' : ''}` : `${m}m`;
}

async function fetchAndAnalyze() {
  const date = document.getElementById('dateInput').value;
  if (!date) return;

  const btn = document.getElementById('fetchBtn');
  btn.disabled = true;
  btn.textContent = '获取中...';
  document.getElementById('errorMsg').style.display = 'none';
  document.getElementById('statsSection').classList.add('hidden');
  document.getElementById('analysisBody').innerHTML = `
    <div class="loading-state">
      <div class="loading-ring"></div>
      <span>正在读取 Oura 数据...</span>
    </div>`;

  try {
    // Fetch sleep data
    const [sleepRes, readinessRes, dailySleepRes] = await Promise.all([
      fetch(`https://api.ouraring.com/v2/usercollection/sleep?start_date=${date}&end_date=${date}`, {
        headers: { Authorization: `Bearer ${OURA_TOKEN}` }
      }),
      fetch(`https://api.ouraring.com/v2/usercollection/daily_readiness?start_date=${date}&end_date=${date}`, {
        headers: { Authorization: `Bearer ${OURA_TOKEN}` }
      }),
      fetch(`https://api.ouraring.com/v2/usercollection/daily_sleep?start_date=${date}&end_date=${date}`, {
        headers: { Authorization: `Bearer ${OURA_TOKEN}` }
      })
    ]);

    if (!sleepRes.ok) throw new Error(`Oura API 错误: ${sleepRes.status}`);
    
    const sleepData = await sleepRes.json();
    const readinessData = await readinessRes.json();
    const dailySleepData = await dailySleepRes.json();

    if (!sleepData.data || sleepData.data.length === 0) {
      throw new Error(`${date} 没有找到睡眠数据，请确认戴环了`);
    }

    // Use the main sleep session (longest or last)
    const sessions = sleepData.data.filter(d => d.type === 'long_sleep' || d.type === 'sleep');
    const s = sessions.length > 0 ? sessions[sessions.length - 1] : sleepData.data[sleepData.data.length - 1];
    const readiness = readinessData.data?.[0];
    const dailySleep = dailySleepData.data?.[0];

    // Update stats UI — score comes from daily_sleep, not sleep session
    const score = dailySleep?.score ?? readiness?.score ?? '—';
    document.getElementById('sleepScore').textContent = score !== '—' ? score : '—';
    if (score !== '—') document.getElementById('scoreBar').style.width = score + '%';

    const totalMins = s.total_sleep_duration ? Math.round(s.total_sleep_duration / 60) : null;
    document.getElementById('totalSleep').textContent = totalMins ? (totalMins / 60).toFixed(1) : '—';
    document.getElementById('hrv').textContent = s.average_hrv ? Math.round(s.average_hrv) : '—';

    document.getElementById('stageAwake').textContent = s.awake_time ? fmtMins(Math.round(s.awake_time/60)) : '—';
    document.getElementById('stageLight').textContent = s.light_sleep_duration ? fmtMins(Math.round(s.light_sleep_duration/60)) : '—';
    document.getElementById('stageDeep').textContent = s.deep_sleep_duration ? fmtMins(Math.round(s.deep_sleep_duration/60)) : '—';
    document.getElementById('stageRem').textContent = s.rem_sleep_duration ? fmtMins(Math.round(s.rem_sleep_duration/60)) : '—';

    document.getElementById('statsSection').classList.remove('hidden');

    // Prepare data summary for Claude
    const sleepSummary = {
      date,
      score: score,
      total_hours: totalMins ? (totalMins/60).toFixed(1) : null,
      deep_min: s.deep_sleep_duration ? Math.round(s.deep_sleep_duration/60) : null,
      rem_min: s.rem_sleep_duration ? Math.round(s.rem_sleep_duration/60) : null,
      light_min: s.light_sleep_duration ? Math.round(s.light_sleep_duration/60) : null,
      awake_min: s.awake_time ? Math.round(s.awake_time/60) : null,
      hrv_avg: s.average_hrv ? Math.round(s.average_hrv) : null,
      resting_hr: s.lowest_heart_rate ?? null,
      efficiency: s.sleep_efficiency ?? null,
      readiness_score: readiness?.score ?? null,
      bedtime_start: s.bedtime_start ?? null,
      bedtime_end: s.bedtime_end ?? null,
      restfulness: s.restfulness ?? null,
      latency: s.sleep_latency ? Math.round(s.sleep_latency/60) : null,
    };

    document.getElementById('analysisBody').innerHTML = `
      <div class="loading-state">
        <div class="loading-ring"></div>
        <span>元气分析生成中...</span>
      </div>`;

    // Call Claude for analysis
    const prompt = `你是一位结合现代睡眠科学和中医体质学的健康顾问，正在为Shirley（水冰月）做每日睡眠分析。

Shirley的背景：
- 体质倾向：需要通过睡眠数据判断当天阴阳状态
- 生活习惯：关注TCM养生、精油疗愈、植物护理、烹饪
- 当前状态：准备TCF法语考试（5月16日），同时在进行求职
- 爱好：研究五行、BaZi、冥想、芳香疗法

今日（${date}）Oura Ring 睡眠数据：
- 睡眠评分：${sleepSummary.score}/100
- 总睡眠：${sleepSummary.total_hours}小时
- 深睡眠：${sleepSummary.deep_min}分钟
- REM睡眠：${sleepSummary.rem_min}分钟
- 浅睡眠：${sleepSummary.light_min}分钟
- 清醒时间：${sleepSummary.awake_min}分钟
- HRV均值：${sleepSummary.hrv_avg}ms
- 静息心率最低：${sleepSummary.resting_hr}bpm
- 睡眠效率：${sleepSummary.efficiency ? (sleepSummary.efficiency*100).toFixed(0)+'%' : '未知'}
- 入睡潜伏期：${sleepSummary.latency}分钟
- 就绪度评分：${sleepSummary.readiness_score}/100
- 入睡时间：${sleepSummary.bedtime_start ? new Date(sleepSummary.bedtime_start).toLocaleTimeString('zh-CN', {hour:'2-digit',minute:'2-digit'}) : '未知'}
- 起床时间：${sleepSummary.bedtime_end ? new Date(sleepSummary.bedtime_end).toLocaleTimeString('zh-CN', {hour:'2-digit',minute:'2-digit'}) : '未知'}

请用中文给出简洁有温度的分析，结构如下（用markdown h4标题分隔）：

#### 今日元气状态
用1-2句话点出今日整体状态，可结合阴阳/五行视角，有个性化感。

#### 睡眠质量解读
从现代睡眠科学角度解读各指标（深睡/REM/HRV），2-3句核心观察。

#### 中医体质视角
结合数据推断今日气血/阴阳状态，并给出对应的养生提示（1-2条具体建议，可涉及精油、食疗、穴位）。

#### 今日行动建议
3条简短的当天具体建议（学习/运动/饮食/作息），结合她正在备考法语和求职的现实。

语气：像一位懂她的朋友+中医顾问，直接务实，不过度煽情，不用"亲爱的"这类词。`;

    const response = await fetch('https://oura-proxy-vercel.vercel.app/api/analyze', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1000,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    const aiData = await response.json();
    const analysisText = aiData.content?.[0]?.text ?? '分析生成失败，请重试。';

    // Render markdown-ish text
    const rendered = analysisText
      .replace(/#### (.+)/g, '<h4>$1</h4>')
      .replace(/\*\*(.+?)\*\*/g, '<strong style="color:var(--amber-light)">$1</strong>')
      .replace(/^- (.+)/gm, '<li>$1</li>')
      .replace(/(<li>.*<\/li>(\n|$))+/gs, match => `<ul>${match}</ul>`)
      .replace(/\n\n/g, '</p><p>')
      .replace(/\n/g, '<br>');

    document.getElementById('analysisBody').innerHTML = `<div class="analysis-text fade-in"><p>${rendered}</p></div>`;

  } catch (err) {
    const errEl = document.getElementById('errorMsg');
    errEl.textContent = err.message;
    errEl.style.display = 'block';
    document.getElementById('analysisBody').innerHTML = `<div class="empty-state">获取失败，请检查网络或日期</div>`;
  }

  btn.disabled = false;
  btn.textContent = '获取分析';
}
</script>
</body>
</html>
